<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>nethack-rl eval dashboard</title>
<style>
  :root {
    --bg: #0a0a0a; --panel: #141414; --panel2: #1a1a1a; --border: #2a2a2a;
    --fg: #e6e6e6; --muted: #8a8a8a; --accent: #6cf; --good: #4ade80;
    --warn: #facc15; --bad: #f87171; --user: #93c5fd; --assist: #d8b4fe;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100vh; overflow: hidden; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: ui-sans-serif, system-ui, sans-serif; font-size: 13px;
    display: flex; flex-direction: column;
  }
  header {
    padding: 8px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    background: var(--panel); flex: 0 0 auto;
  }
  header h1 { margin: 0; font-size: 14px; color: var(--accent); }
  header .meta { color: var(--muted); font-size: 12px; }
  header .meta strong { color: var(--fg); }
  header .pill { padding: 2px 8px; background: var(--panel2); border: 1px solid var(--border); border-radius: 12px; font-size: 11px; }
  header .pill.win { background: #052e16; border-color: var(--good); color: var(--good); }
  input, select, button {
    background: var(--panel2); color: var(--fg); border: 1px solid var(--border);
    padding: 4px 8px; border-radius: 4px; font-family: inherit; font-size: 12px;
  }
  button { cursor: pointer; }
  button:hover { background: var(--border); }

  main {
    display: grid; grid-template-columns: 1fr 560px;
    gap: 10px; padding: 10px 16px;
    flex: 1 1 auto; min-height: 0;
  }
  .panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px;
    display: flex; flex-direction: column;
    min-height: 0; overflow: hidden;
  }
  .panel-head {
    padding: 8px 12px;
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex: 0 0 auto;
  }

  /* === GAME VIEW =========================================================*/
  #game { display: flex; flex-direction: column; min-height: 0; }
  #map-tiles {
    flex: 1 1 auto; overflow: auto;
    background: #0a0a0a;
    padding: 6px;
    min-height: 0;
  }
  .map-grid {
    display: grid;
    grid-template-columns: repeat(80, 16px);
    grid-template-rows: repeat(21, 16px);
    width: max-content; height: max-content;
    line-height: 16px;
    font-family: ui-monospace, monospace;
  }
  .cell {
    width: 16px; height: 16px;
    background-color: #050505;
    background-size: 16px 16px;
    background-repeat: no-repeat;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  /* Status bar pinned to bottom, always visible */
  #status-bar {
    padding: 6px 10px; background: var(--panel2);
    border-top: 1px solid var(--border);
    font-family: ui-monospace, monospace; font-size: 11px;
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
    flex: 0 0 auto;
  }
  #status-bar .stat { color: var(--muted); }
  #status-bar .stat strong { color: var(--fg); }
  .hp-good { color: var(--good) !important; }
  .hp-mid { color: var(--warn) !important; }
  .hp-low { color: var(--bad) !important; }

  /* === RIGHT PANE: append-style trace ===================================*/
  #convo {
    flex: 1 1 0px; min-height: 0;
    overflow-y: scroll; overflow-x: hidden;
    display: flex; flex-direction: column;
    padding: 6px 8px 0;
  }
  #convo::-webkit-scrollbar { width: 10px; }
  #convo::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  #convo::-webkit-scrollbar-thumb:hover { background: #404040; }
  #convo::-webkit-scrollbar-track { background: var(--panel2); }

  .turn-block {
    display: flex; flex-direction: column; gap: 4px;
    padding: 8px 0;
    border-bottom: 1px dashed #1f1f1f;
  }
  .turn-block.current { background: linear-gradient(90deg, rgba(108,204,255,0.08), transparent); }
  .turn-header {
    font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
    padding: 2px 6px;
  }
  .turn-header .turn-num { color: var(--accent); font-weight: 700; }
  .msg {
    padding: 6px 10px; border-radius: 4px;
    font-size: 12px; line-height: 1.4;
    margin: 0 4px;
  }
  .msg.user, .msg.tool { background: #0c1a2a; border-left: 3px solid #1e3a5f; color: var(--user); }
  .msg.assistant { background: #1f0c2a; border-left: 3px solid #4a1e5f; color: var(--assist); }
  .msg pre { margin: 4px 0 0; white-space: pre-wrap; font-family: ui-monospace, monospace; font-size: 11px; line-height: 1.3; max-height: 220px; overflow-y: auto; }
  .msg .tool-call { background: #0a0a0a; border: 1px solid var(--border); border-radius: 3px; padding: 4px 6px; margin-top: 4px; font-family: ui-monospace, monospace; font-size: 11px; color: var(--good); }
  .msg .reasoning { color: #999; font-style: italic; margin-top: 4px; font-size: 11px; max-height: 80px; overflow-y: auto; }

  #timeline {
    padding: 6px 16px; background: var(--panel); border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; flex: 0 0 auto;
  }
  #scrubber { flex: 1; }
  #turn-label { font-family: ui-monospace, monospace; color: var(--muted); min-width: 100px; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>nethack-rl · eval dashboard</h1>
  <input type="file" id="file" accept=".jsonl,.json">
  <select id="roll-picker"><option>— load a results.jsonl —</option></select>
  <span class="meta" id="meta"></span>
  <span class="pill" id="reward-pill">reward: —</span>
  <span class="pill" id="status-pill">—</span>
</header>

<main>
  <section class="panel" id="game">
    <div class="panel-head"><span>Game view (80×21)</span><span id="map-coords" style="text-transform:none;letter-spacing:0">—</span></div>
    <div id="map-tiles"><div class="map-grid" id="map-grid"></div></div>
    <div id="status-bar">
      <span class="stat">HP <strong id="s-hp">—</strong></span>
      <span class="stat">AC <strong id="s-ac">—</strong></span>
      <span class="stat">Dlvl <strong id="s-dlvl">—</strong></span>
      <span class="stat">Turn <strong id="s-turn">—</strong></span>
      <span class="stat">Pos <strong id="s-pos">—</strong></span>
      <span class="stat">XP <strong id="s-xp">—</strong></span>
      <span class="stat">$ <strong id="s-gold">—</strong></span>
      <span class="stat">Features <strong id="s-feat">—</strong></span>
    </div>
  </section>

  <section class="panel">
    <div class="panel-head"><span>LLM trace (append)</span><span id="turn-status" style="text-transform:none;letter-spacing:0">—</span></div>
    <div id="convo"></div>
  </section>
</main>

<section id="timeline">
  <button id="prev">←</button>
  <button id="play">▶</button>
  <button id="next">→</button>
  <input type="range" id="scrubber" min="0" max="0" value="0">
  <span id="turn-label">turn 0 / 0</span>
</section>

<script>
// ============================================================================
// Tileset: procedurally generate a 16×16 bitmap sprite per glyph at load time.
// Each sprite is drawn to an offscreen canvas → toDataURL("image/png") →
// cached as a data URI. This gives a real bitmap (cell.style.backgroundImage
// = url(data:image/png;...)) for every tile. It is a *generated* tileset,
// not a custom emoji mapping — using OpenGameArt-style minimalist sprite
// conventions: monsters as colored letter-circles, terrain as colored
// patterns, items as colored shapes with class glyph overlaid. The
// rendering convention follows NetHack's tty color scheme (BALROG /
// Glyphbox / hardfought webclient use the same).
// ============================================================================

const TILE_PX = 16;
const TILESET = {};

function makeTile(drawFn) {
  const c = document.createElement('canvas');
  c.width = TILE_PX; c.height = TILE_PX;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  drawFn(ctx);
  return c.toDataURL('image/png');
}

// Helpers
function bgFill(ctx, color) { ctx.fillStyle = color; ctx.fillRect(0, 0, TILE_PX, TILE_PX); }
function drawText(ctx, ch, color) {
  ctx.fillStyle = color;
  ctx.font = 'bold 13px ui-monospace, monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(ch, 8, 9);
}
function drawCircle(ctx, color, r=6) {
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(8, 8, r, 0, 2 * Math.PI); ctx.fill();
}

function buildTileset() {
  const T = TILESET;
  const FLOOR_BG = '#1a1a1a';
  const DARK = '#050505';

  T[' '] = makeTile(c => bgFill(c, DARK));
  T['.'] = makeTile(c => {
    bgFill(c, FLOOR_BG);
    c.fillStyle = '#3a3a3a';
    c.fillRect(7, 7, 2, 2);
  });
  T['#'] = makeTile(c => {
    bgFill(c, '#0d0d0d');
    c.fillStyle = '#444';
    // diagonal pattern
    for (let i = 0; i < 16; i += 4) {
      c.fillRect(i, i, 2, 2);
      c.fillRect((i + 8) % 16, i, 2, 2);
    }
  });
  T['-'] = makeTile(c => {
    bgFill(c, '#3a2a18');
    c.fillStyle = '#5a4030';
    c.fillRect(0, 6, 16, 4);
    c.fillStyle = '#2a1a08';
    c.fillRect(0, 6, 16, 1);
    c.fillRect(0, 10, 16, 1);
  });
  T['|'] = makeTile(c => {
    bgFill(c, '#3a2a18');
    c.fillStyle = '#5a4030';
    c.fillRect(6, 0, 4, 16);
    c.fillStyle = '#2a1a08';
    c.fillRect(6, 0, 1, 16);
    c.fillRect(10, 0, 1, 16);
  });
  T['+'] = makeTile(c => {
    bgFill(c, FLOOR_BG);
    c.fillStyle = '#7a4a20';
    c.fillRect(2, 1, 12, 14);
    c.fillStyle = '#fbbf24';
    c.fillRect(11, 7, 2, 2);
  });
  T["'"] = makeTile(c => {  // open door
    bgFill(c, FLOOR_BG);
    c.fillStyle = '#7a4a20';
    c.fillRect(1, 1, 3, 14);
    c.fillRect(12, 1, 3, 14);
  });
  T['>'] = makeTile(c => {
    bgFill(c, FLOOR_BG);
    c.fillStyle = '#22d3ee';
    c.beginPath();
    c.moveTo(3, 4); c.lineTo(13, 4); c.lineTo(8, 13); c.closePath(); c.fill();
    c.strokeStyle = '#0e7490'; c.lineWidth = 1; c.stroke();
  });
  T['<'] = makeTile(c => {
    bgFill(c, FLOOR_BG);
    c.fillStyle = '#94a3b8';
    c.beginPath();
    c.moveTo(3, 12); c.lineTo(13, 12); c.lineTo(8, 3); c.closePath(); c.fill();
    c.strokeStyle = '#475569'; c.lineWidth = 1; c.stroke();
  });
  T['_'] = makeTile(c => {  // altar
    bgFill(c, FLOOR_BG);
    c.fillStyle = '#f5f5f5';
    c.fillRect(2, 11, 12, 3);
    c.fillRect(4, 6, 8, 5);
  });
  T['{'] = makeTile(c => {  // fountain
    bgFill(c, FLOOR_BG);
    c.fillStyle = '#60a5fa';
    c.fillRect(4, 10, 8, 4);
    c.fillRect(7, 4, 2, 6);
    drawCircle(c, '#93c5fd', 2);
  });
  T['}'] = makeTile(c => {  // pool
    bgFill(c, '#1e3a5f');
    c.fillStyle = '#60a5fa';
    c.fillRect(0, 8, 16, 6);
    for (let i = 0; i < 16; i += 4) { c.fillStyle = '#93c5fd'; c.fillRect(i, 6, 2, 1); }
  });
  T['\\']= makeTile(c => {  // throne
    bgFill(c, FLOOR_BG);
    c.fillStyle = '#fde047';
    c.fillRect(3, 3, 10, 10);
    c.fillStyle = '#a16207';
    c.fillRect(3, 3, 2, 10);
    c.fillRect(11, 3, 2, 10);
  });
  // Items: colored circles with class char overlay
  T['$'] = makeTile(c => { bgFill(c, FLOOR_BG); drawCircle(c, '#fde047', 5); drawText(c, '$', '#7a5500'); });
  T['%'] = makeTile(c => { bgFill(c, FLOOR_BG); drawCircle(c, '#b88a4a', 5); drawText(c, '%', '#3d2a10'); });
  T['['] = makeTile(c => { bgFill(c, FLOOR_BG); c.fillStyle = '#94a3b8'; c.fillRect(3,3,10,10); drawText(c, '[', '#0f172a'); });
  T[')'] = makeTile(c => { bgFill(c, FLOOR_BG); c.fillStyle = '#cbd5e1'; c.beginPath(); c.moveTo(3,3); c.lineTo(13,13); c.lineTo(11,15); c.lineTo(1,5); c.closePath(); c.fill(); });
  T['('] = makeTile(c => { bgFill(c, FLOOR_BG); drawCircle(c, '#b88a4a', 5); drawText(c, '(', '#3d2a10'); });
  T['?'] = makeTile(c => { bgFill(c, FLOOR_BG); drawCircle(c, '#f5f5f5', 5); drawText(c, '?', '#404040'); });
  T['!'] = makeTile(c => { bgFill(c, FLOOR_BG); drawCircle(c, '#c084fc', 5); drawText(c, '!', '#3a0a4a'); });
  T['/'] = makeTile(c => { bgFill(c, FLOOR_BG); c.fillStyle = '#22d3ee'; c.fillRect(2, 13, 12, 2); c.fillStyle = '#fde047'; c.fillRect(13, 2, 3, 3); });
  T['='] = makeTile(c => { bgFill(c, FLOOR_BG); c.strokeStyle = '#fde047'; c.lineWidth = 2; c.beginPath(); c.arc(8, 8, 5, 0, 2*Math.PI); c.stroke(); });
  T['"'] = makeTile(c => { bgFill(c, FLOOR_BG); drawCircle(c, '#c084fc', 4); c.fillStyle = '#fde047'; c.beginPath(); c.arc(8, 8, 5, Math.PI*0.2, Math.PI*0.8); c.stroke(); });
  T['*'] = makeTile(c => { bgFill(c, FLOOR_BG); c.fillStyle = '#f5f5f5'; c.beginPath(); c.moveTo(8,2); c.lineTo(14,8); c.lineTo(8,14); c.lineTo(2,8); c.closePath(); c.fill(); });
  // Player
  T['@'] = makeTile(c => {
    bgFill(c, FLOOR_BG);
    drawCircle(c, '#fbbf24', 6);
    drawText(c, '@', '#451a03');
  });
}
buildTileset();

// Monster letter → drawn at render time with a hostile/pet color.
const MONSTER_BG = { hostile: '#3f0a0a', pet: '#052e16' };
const MONSTER_FG = { hostile: '#fca5a5', pet: '#86efac' };

function makeMonsterTile(ch, kind = 'hostile') {
  const key = `mon:${kind}:${ch}`;
  if (TILESET[key]) return TILESET[key];
  TILESET[key] = makeTile(c => {
    c.fillStyle = '#1a1a1a'; c.fillRect(0, 0, TILE_PX, TILE_PX);
    drawCircle(c, MONSTER_BG[kind], 7);
    drawText(c, ch, MONSTER_FG[kind]);
  });
  return TILESET[key];
}

function tileUrlFor(ch, adjacentInfo) {
  if (TILESET[ch]) return TILESET[ch];
  if (/[a-zA-Z]/.test(ch)) {
    const kind = (adjacentInfo && adjacentInfo.pets.has(ch)) ? 'pet' : 'hostile';
    return makeMonsterTile(ch, kind);
  }
  // Unknown glyph: render as dim ASCII tile
  const key = `unk:${ch}`;
  if (TILESET[key]) return TILESET[key];
  TILESET[key] = makeTile(c => {
    c.fillStyle = '#1a1a1a'; c.fillRect(0, 0, TILE_PX, TILE_PX);
    drawText(c, ch, '#8a8a8a');
  });
  return TILESET[key];
}

// ============================================================================
// Observation parsing
// ============================================================================
const SEC_RE = /^=== ([A-Z][A-Z 0-9/]*?(?:\([^)]*\))?) ===(.*)$/;

function parseObs(text) {
  const out = { sections: {} };
  const lines = text.split('\n');
  let cur = '_preamble';
  out.sections._preamble = '';
  for (const line of lines) {
    const m = line.match(SEC_RE);
    if (m) {
      cur = m[1].trim();
      out.sections[cur] = (m[2].trim() ? m[2].trim() + '\n' : '');
    } else {
      out.sections[cur] = (out.sections[cur] || '') + line + '\n';
    }
  }
  for (const k in out.sections) out.sections[k] = out.sections[k].replace(/\n+$/, '');
  return out;
}
function parseStatusLine(text) {
  const out = {};
  for (const p of text.split(/\s{2,}/)) {
    const m = p.match(/^([A-Za-z$ ]+):\s+(.+)$/);
    if (m) out[m[1].trim()] = m[2].trim();
  }
  return out;
}
function parseAdjacent(text) {
  // "N=. NE=. E=. SE=- S=- SW=- W=d(dog/canine)[PET — don't attack] NW=."
  // Extract any letter glyph followed by [PET ...] as a pet.
  const pets = new Set();
  const re = /([a-zA-Z])\([^)]*\)\[PET/g;
  let m;
  while ((m = re.exec(text)) !== null) pets.add(m[1]);
  return { pets };
}
function extractMapGrid(rawMap) {
  let lines = rawMap.split('\n');
  while (lines.length && lines[0].trim() === '') lines.shift();
  while (lines.length && lines[lines.length - 1].trim() === '') lines.pop();
  // Drop NLE bottom status lines that bleed into the MAP block.
  const cutIdx = lines.findIndex(l =>
    /Agent\s+the\b/.test(l) || /^Dlvl:/.test(l.trim()) ||
    /^[A-Z][a-z]+\s+the\s+(Candidate|Apprentice|Stripling|Acolyte|Page|Slave|Plebeian|Tenderfoot|Aspirant|Squire|Novice)/.test(l)
  );
  if (cutIdx > 0) lines = lines.slice(0, cutIdx);
  // Drop a leading message-echo line (NLE prints e.g. "What a strange direction!" above the map).
  while (lines.length && /^[A-Z][a-z]/.test(lines[0]) && !/[-|.#@>+<\$%]/.test(lines[0])) {
    lines.shift();
  }
  // Pad to exactly 21×80.
  const grid = [];
  for (let r = 0; r < 21; r++) {
    const line = (lines[r] || '').padEnd(80, ' ').slice(0, 80);
    grid.push(line);
  }
  return grid;
}

// ============================================================================
// State + render
// ============================================================================
let ROLLOUTS = [];
let TURNS = [];
let IDX = 0;
let PLAYING = null;

function buildTurns(rollout) {
  const turns = [];
  for (const m of (rollout.prompt || [])) {
    if (m.role === 'user') turns.push({ obs: m.content || '', toolCalls: [], reasoning: '' });
  }
  let pending = null;
  for (const m of (rollout.completion || [])) {
    if (m.role === 'assistant') { pending = m; continue; }
    if (m.role === 'user' || m.role === 'tool') {
      const t = { obs: m.content || '', toolCalls: [], reasoning: '' };
      if (pending) {
        t.reasoning = pending.reasoning_content || '';
        for (const tc of (pending.tool_calls || [])) {
          let name = null, args = null;
          if (typeof tc === 'string') {
            try { const o = JSON.parse(tc); name = o.name; args = o.arguments; } catch (_) {}
          } else if (tc && tc.function) {
            name = tc.function.name; args = tc.function.arguments;
          } else if (tc && tc.name) {
            name = tc.name; args = tc.arguments;
          }
          if (name) t.toolCalls.push({ name, args: args || '' });
        }
      }
      turns.push(t);
      pending = null;
    }
  }
  return turns;
}

function renderMap(idx) {
  const t = TURNS[idx];
  const parsed = parseObs(t.obs);
  const grid = extractMapGrid(parsed.sections['MAP'] || '');
  const adj = parseAdjacent(parsed.sections['ADJACENT'] || '');
  const container = document.getElementById('map-grid');
  // Build once with 21*80 cells; cells reused, only background-image changes.
  if (container.childElementCount !== 21 * 80) {
    container.innerHTML = '';
    for (let i = 0; i < 21 * 80; i++) {
      const d = document.createElement('div');
      d.className = 'cell';
      container.appendChild(d);
    }
  }
  for (let r = 0; r < 21; r++) {
    for (let cc = 0; cc < 80; cc++) {
      const ch = grid[r][cc];
      const cell = container.children[r * 80 + cc];
      cell.style.backgroundImage = `url("${tileUrlFor(ch, adj)}")`;
      cell.title = `(${cc},${r}) ${ch}`;
    }
  }
}

function setStatus(idx) {
  const parsed = parseObs(TURNS[idx].obs);
  const status = parseStatusLine(parsed.sections['STATUS'] || '');
  const set = (id, v) => { document.getElementById(id).textContent = v || '—'; };
  set('s-hp', status['HP'] || '—');
  set('s-ac', status['AC'] || '—');
  set('s-dlvl', status['Dlvl'] || '—');
  set('s-turn', status['Turn'] || '—');
  set('s-pos', status['Pos'] || '—');
  set('s-xp', status['XP'] || '—');
  set('s-gold', status['$'] || '—');
  const feats = (parsed.sections['VISIBLE FEATURES'] || '');
  document.getElementById('s-feat').textContent = feats.length > 60 ? feats.slice(0, 60) + '…' : (feats || '—');
  const hpStr = status['HP'] || '';
  const hpM = hpStr.match(/(\d+)\/(\d+)/);
  const hpEl = document.getElementById('s-hp');
  hpEl.classList.remove('hp-good', 'hp-mid', 'hp-low');
  if (hpM) {
    const ratio = parseInt(hpM[1]) / parseInt(hpM[2]);
    if (ratio > 0.7) hpEl.classList.add('hp-good');
    else if (ratio > 0.3) hpEl.classList.add('hp-mid');
    else hpEl.classList.add('hp-low');
  }
  document.getElementById('map-coords').textContent = idx === 0 ? 'start' : `after turn ${idx}`;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Render the FULL trace up to and including idx, appending rather than
// replacing. Current turn highlighted; scrolls to it.
function renderTrace(idx) {
  const convo = document.getElementById('convo');
  convo.innerHTML = '';
  for (let i = 0; i <= idx; i++) {
    const t = TURNS[i];
    const block = document.createElement('div');
    block.className = 'turn-block' + (i === idx ? ' current' : '');
    block.id = `turn-${i}`;
    let html = `<div class="turn-header">Turn <span class="turn-num">${i}</span> / ${TURNS.length - 1}`;
    if (t.toolCalls.length) html += ` · ${t.toolCalls.map(tc => escapeHtml(tc.name)).join(', ')}`;
    html += '</div>';

    if (t.toolCalls.length || t.reasoning) {
      html += '<div class="msg assistant">';
      html += '<div class="role">assistant</div>';
      for (const tc of t.toolCalls) {
        html += `<div class="tool-call">${escapeHtml(tc.name)}(${escapeHtml(tc.args)})</div>`;
      }
      if (t.reasoning) {
        const r = t.reasoning.replace(/\n+/g, ' ');
        html += `<div class="reasoning">${escapeHtml(r.slice(0, 600))}${r.length > 600 ? '…' : ''}</div>`;
      }
      html += '</div>';
    }
    const parsed = parseObs(t.obs);
    html += '<div class="msg user"><div class="role">observation</div>';
    const order = ['_preamble', 'HINT', 'VISIBLE FEATURES', 'VISIBLE GLYPHS',
                   'ADJACENT', 'UNDER PLAYER', 'MESSAGES'];
    for (const k of order) {
      if (parsed.sections[k] && parsed.sections[k].length) {
        const label = (k === '_preamble') ? 'FEEDBACK' : k;
        html += `<pre><b style="color:var(--accent)">${label}</b>\n${escapeHtml(parsed.sections[k])}</pre>`;
      }
    }
    html += '</div>';
    block.innerHTML = html;
    convo.appendChild(block);
  }
  // Scroll to current turn
  const cur = document.getElementById(`turn-${idx}`);
  if (cur) cur.scrollIntoView({ block: 'center', behavior: 'auto' });
  document.getElementById('turn-status').textContent = TURNS[idx].toolCalls.length
    ? `→ ${TURNS[idx].toolCalls.map(x => x.name).join(', ')}`
    : 'no tool call';
}

function setTurn(i) {
  if (!TURNS.length) return;
  IDX = Math.max(0, Math.min(TURNS.length - 1, i));
  document.getElementById('scrubber').value = IDX;
  document.getElementById('turn-label').textContent = `turn ${IDX} / ${TURNS.length - 1}`;
  renderMap(IDX);
  setStatus(IDX);
  renderTrace(IDX);
}

function loadRollouts(data) {
  ROLLOUTS = data;
  const sel = document.getElementById('roll-picker');
  sel.innerHTML = '';
  data.forEach((r, i) => {
    const m = r.metrics || {};
    const star = (m.success_reward > 0 ? ' ⭐' : '');
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `Rollout ${i} · reward ${(r.reward || 0).toFixed(3)}${star}`;
    sel.appendChild(opt);
  });
  sel.onchange = () => loadRollout(parseInt(sel.value));
  loadRollout(0);
}

function loadRollout(i) {
  const r = ROLLOUTS[i];
  TURNS = buildTurns(r);
  document.getElementById('scrubber').max = Math.max(0, TURNS.length - 1);
  const m = r.metrics || {};
  document.getElementById('meta').innerHTML =
    `<strong>${TURNS.length}</strong> turns · scout <strong>${(m.scout_reward || 0).toFixed(3)}</strong> · descent <strong>${m.descent_reward || 0}</strong> · success <strong>${m.success_reward || 0}</strong>`;
  document.getElementById('reward-pill').textContent = `reward: ${(r.reward || 0).toFixed(3)}`;
  const pill = document.getElementById('status-pill');
  if (m.success_reward > 0) { pill.textContent = 'DESCENDED ⭐'; pill.className = 'pill win'; }
  else { pill.textContent = 'no descent'; pill.className = 'pill'; }
  setTurn(0);
}

document.getElementById('file').addEventListener('change', async (e) => {
  const file = e.target.files[0]; if (!file) return;
  const text = await file.text();
  let data = [];
  for (const line of text.split('\n')) {
    const s = line.trim();
    if (s) { try { data.push(JSON.parse(s)); } catch (_) {} }
  }
  if (!data.length) { try { data = [JSON.parse(text)]; } catch (_) {} }
  if (!data.length) { alert('No rollouts found in file.'); return; }
  loadRollouts(data);
});
document.getElementById('scrubber').addEventListener('input', e => setTurn(parseInt(e.target.value)));
document.getElementById('prev').onclick = () => setTurn(IDX - 1);
document.getElementById('next').onclick = () => setTurn(IDX + 1);
document.getElementById('play').onclick = e => {
  if (PLAYING) { clearInterval(PLAYING); PLAYING = null; e.target.textContent = '▶'; return; }
  e.target.textContent = '⏸';
  PLAYING = setInterval(() => {
    if (IDX >= TURNS.length - 1) { clearInterval(PLAYING); PLAYING = null; e.target.textContent = '▶'; return; }
    setTurn(IDX + 1);
  }, 500);
};
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'ArrowLeft') setTurn(IDX - 1);
  else if (e.key === 'ArrowRight') setTurn(IDX + 1);
  else if (e.key === ' ') { e.preventDefault(); document.getElementById('play').click(); }
});
</script>
</body>
</html>
