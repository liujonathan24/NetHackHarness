<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{% block title %}NetHack Console{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='console.css') }}">
  <script src="{{ url_for('static', filename='console.js') }}"></script>
</head>
<body>
  <nav id="nav">
    <a class="brand" href="/"><span class="glyph">@</span>NetHack Console</a>
    <a class="link {{ 'active' if active=='map' else '' }}" href="/map">Map Viewer</a>
    <a class="link {{ 'active' if active=='obs' else '' }}" href="/obs">Observation Creator</a>
    <a class="link {{ 'active' if active=='traces' else '' }}" href="/traces">Tracer</a>
    <span class="spacer"></span>
    <a class="link {{ 'active' if active=='home' else '' }}" href="/">Home</a>
  </nav>
  {% block body %}{% endblock %}
</body>
</html>
