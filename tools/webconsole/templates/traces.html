{% extends "base.html" %}
{% block title %}Tracer — NetHack Console{% endblock %}
{% block body %}
<div class="page">
  <nav id="t-list" aria-label="Recorded rollouts">loading…</nav>
  <main id="main-content" class="t-main" tabindex="-1">
    <h1 class="sr-only">Tracer — replay recorded rollouts</h1>
    <div id="t-status" role="status" aria-live="polite">pick a trace on the left</div>
    <label for="scrub" class="sr-only">Scrub to a turn in the trace</label>
    <input type="range" id="scrub" min="0" max="0" value="0"
           aria-label="Turn" oninput="showTurn(+this.value)">
    <div id="t-resume"></div>
    <div id="t-turninfo"></div>
    <div id="t-msgs" role="status" aria-live="polite"></div>
    <div id="t-map" class="screen" role="img" aria-label="Replayed map at the selected turn"></div>
    <div id="t-llm"></div>
  </main>
</div>

<script>
let TURNS=[];
async function loadTraceList(){
  const box=document.getElementById('t-list');
  let list;
  try{ list=await(await fetch('/traces',{headers:{'Accept':'application/json'}})).json(); }
  catch(e){ box.innerHTML='<div class="obs-hint">could not load trace list.</div>'; return; }
  if(!list.length){box.innerHTML='<div class="obs-hint">no .ndjson traces found.<br>Record one in the Map Viewer.</div>'; return;}
  box.innerHTML='<h2 id="t-list-h">Rollouts</h2>';
  list.forEach(f=>{const d=document.createElement('button'); d.className='f'; d.type='button';
    const turns=f.turns+' turn'+(f.turns===1?'':'s');  // "1 turn" not "1 turns"
    d.textContent=f.name+'  ('+turns+')';
    d.setAttribute('aria-label','Load trace '+f.name+', '+turns);
    d.onclick=()=>{loadTrace(f.path);
      box.querySelectorAll('.f').forEach(b=>b.removeAttribute('aria-current'));
      d.setAttribute('aria-current','true');};
    box.appendChild(d);});
}
let _traceReq=0;
async function loadTrace(path){
  const myReq=++_traceReq;  // ignore a stale response if a newer trace was clicked
  let r;
  try{ r=await(await fetch('/trace?path='+encodeURIComponent(path))).json(); }
  catch(e){ r={error:'could not load trace'}; }
  if(myReq!==_traceReq) return;  // superseded by a later loadTrace
  if(r.error){ document.getElementById('t-status').textContent='⚠ '+r.error; return; }
  TURNS=r.turns||[];
  const sc=document.getElementById('scrub'); sc.max=Math.max(0,TURNS.length-1); sc.value=0;
  if(!TURNS.length){  // empty trace: report it instead of leaving stale panes
    document.getElementById('t-status').textContent='this trace has no turns';
    ['t-turninfo','t-msgs','t-llm','t-resume','t-map'].forEach(id=>document.getElementById(id).innerHTML='');
    return;
  }
  showTurn(0);
}
function showTurn(i){
  if(!TURNS.length)return; const t=TURNS[i]||TURNS[0]; const s=t.status||{};
  document.getElementById('t-status').textContent='HP '+(s.hp??'?')+'/'+(s.max_hp??'?')+'   Dlvl '+(s.dlvl??'?')+'   reward '+(+t.reward||0).toFixed(2);  // +coerce: a foreign trace's non-numeric reward must not throw on .toFixed
  document.getElementById('t-turninfo').textContent='turn '+t.turn+'  ('+(i+1)+'/'+TURNS.length+')';
  // The slider value is a 0-based index, not the (possibly skipping) turn number;
  // announce the meaningful turn + position so a screen reader doesn't just read
  // the raw index. (t-turninfo is no longer aria-live to avoid double-announcing.)
  document.getElementById('scrub').setAttribute('aria-valuetext','turn '+t.turn+', '+(i+1)+' of '+TURNS.length);
  document.getElementById('t-msgs').textContent=(t.messages||[]).join('  ');
  const rz=document.getElementById('t-resume');
  if(t.checkpoint){
    rz.innerHTML='<button type="button" class="act-btn" id="resumebtn"><span aria-hidden="true">&#9658;</span> Resume from this floor</button>'+
                 '<span id="resumestat" role="status" aria-live="polite"></span>';
    document.getElementById('resumebtn').onclick=()=>resumeFloor(t.checkpoint);
  } else { rz.innerHTML=''; }
  document.getElementById('t-map').innerHTML=colorize(t.raw_grid||[],null);
  let llm=''; if(t.user) llm+='<div class="lbl">user</div><pre>'+escHtml(t.user)+'</pre>';
  if(t.assistant) llm+='<div class="lbl">assistant</div><pre>'+escHtml(t.assistant)+'</pre>';
  if(t.tool_calls&&t.tool_calls.length) llm+='<div class="lbl">tool_calls</div><pre>'+escHtml(JSON.stringify(t.tool_calls,null,1))+'</pre>';
  document.getElementById('t-llm').innerHTML=llm;
}
async function resumeFloor(ckpt){
  const stat=document.getElementById('resumestat'); if(stat)stat.textContent='resuming…';
  const r=await post('/resume',{checkpoint:ckpt});
  if(r&&r.error){ if(stat)stat.textContent='error: '+r.error; return; }
  window.location='/map';  // Map Viewer renders the resumed state (see /current)
}
loadTraceList();
</script>
{% endblock %}
