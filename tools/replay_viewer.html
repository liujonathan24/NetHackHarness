<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>nethack-rl replay viewer</title>
<style>
  :root {
    --bg: #0d1117;
    --fg: #e6edf3;
    --muted: #7d8590;
    --accent: #58a6ff;
    --good: #3fb950;
    --warn: #d29922;
    --bad: #f85149;
    --panel: #161b22;
    --border: #30363d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    font-size: 14px;
  }
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
  }
  header h1 {
    margin: 0; font-size: 16px; font-weight: 600; color: var(--accent);
  }
  header .meta {
    color: var(--muted); font-size: 12px;
  }
  header .meta strong { color: var(--fg); }
  #file-picker {
    background: var(--panel); color: var(--fg);
    border: 1px solid var(--border); padding: 6px 10px; border-radius: 4px;
  }
  main {
    display: grid;
    grid-template-columns: minmax(640px, 1fr) 380px;
    gap: 16px;
    padding: 16px 20px;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
  }
  .panel h2 {
    margin: 0 0 8px 0; font-size: 12px; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em;
  }
  pre.tty {
    margin: 0;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px; line-height: 1.15;
    white-space: pre; color: var(--fg);
    overflow-x: auto;
  }
  .status-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px 12px;
    font-family: ui-monospace, monospace; font-size: 12px;
  }
  .status-grid .k { color: var(--muted); }
  .status-grid .v { color: var(--fg); text-align: right; }
  .inv-list { list-style: none; padding: 0; margin: 0; font-family: ui-monospace, monospace; font-size: 12px; }
  .inv-list li { padding: 1px 0; }
  .inv-list .letter { display: inline-block; width: 16px; color: var(--accent); }
  .inv-list .flag { color: var(--good); margin-left: 4px; font-size: 10px; }
  .messages { font-family: ui-monospace, monospace; font-size: 12px; color: var(--warn); }
  .controls {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
  }
  .controls button {
    background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px;
    cursor: pointer; font-size: 12px;
  }
  .controls button:hover { border-color: var(--accent); color: var(--accent); }
  .controls button:disabled { opacity: 0.4; cursor: not-allowed; }
  .controls input[type=range] { flex: 1; }
  .frame-label { color: var(--muted); font-family: ui-monospace, monospace; font-size: 12px; min-width: 140px; }
  .reward-pos { color: var(--good); }
  .reward-zero { color: var(--muted); }
  .reward-neg { color: var(--bad); }
  .empty {
    color: var(--muted); font-style: italic; font-size: 12px;
  }
  details { font-size: 12px; }
  details summary { color: var(--muted); cursor: pointer; }
  .journal { font-family: ui-monospace, monospace; font-size: 12px; }
  .journal .obj { color: var(--accent); margin-bottom: 6px; }
  .skill { font-family: ui-monospace, monospace; font-size: 12px; color: var(--good); }
</style>
</head>
<body>
<header>
  <h1>nethack-rl replay viewer</h1>
  <input type="file" id="file-picker" accept=".json">
  <div class="meta">
    <span>seeds: <strong id="meta-seeds">—</strong></span>
    <span style="margin-left: 16px;">task: <strong id="meta-task">—</strong></span>
    <span style="margin-left: 16px;">character: <strong id="meta-character">—</strong></span>
    <span style="margin-left: 16px;">outcome: <strong id="meta-outcome">—</strong></span>
    <span style="margin-left: 16px;">total reward: <strong id="meta-reward">—</strong></span>
  </div>
</header>

<main>
  <section class="panel" id="map-panel">
    <h2>Map (tty)</h2>
    <pre class="tty" id="tty">Load a trajectory JSON to begin.</pre>
  </section>

  <aside>
    <section class="panel">
      <h2>Status</h2>
      <div class="status-grid" id="status"></div>
    </section>
    <section class="panel" style="margin-top: 12px;">
      <h2>Last message</h2>
      <div class="messages" id="message">—</div>
    </section>
    <section class="panel" style="margin-top: 12px;">
      <h2>Inventory</h2>
      <ul class="inv-list" id="inventory"></ul>
    </section>
    <section class="panel" style="margin-top: 12px;">
      <h2>Journal</h2>
      <div class="journal" id="journal"></div>
    </section>
    <section class="panel" style="margin-top: 12px;">
      <h2>This step</h2>
      <div class="skill" id="skill">—</div>
      <div class="frame-label" style="margin-top: 4px;">reward: <span id="reward">—</span></div>
    </section>
  </aside>

  <div class="controls">
    <button id="btn-first" title="First frame">⏮</button>
    <button id="btn-prev" title="Previous">◀</button>
    <button id="btn-play" title="Play / pause">▶</button>
    <button id="btn-next" title="Next">▶|</button>
    <button id="btn-last" title="Last frame">⏭</button>
    <input type="range" id="scrub" min="0" max="0" value="0">
    <span class="frame-label" id="frame-label">frame 0 / 0</span>
  </div>
</main>

<script>
  const els = {
    tty: document.getElementById('tty'),
    status: document.getElementById('status'),
    message: document.getElementById('message'),
    inventory: document.getElementById('inventory'),
    journal: document.getElementById('journal'),
    skill: document.getElementById('skill'),
    reward: document.getElementById('reward'),
    scrub: document.getElementById('scrub'),
    frameLabel: document.getElementById('frame-label'),
    btnFirst: document.getElementById('btn-first'),
    btnPrev: document.getElementById('btn-prev'),
    btnPlay: document.getElementById('btn-play'),
    btnNext: document.getElementById('btn-next'),
    btnLast: document.getElementById('btn-last'),
    metaSeeds: document.getElementById('meta-seeds'),
    metaTask: document.getElementById('meta-task'),
    metaCharacter: document.getElementById('meta-character'),
    metaOutcome: document.getElementById('meta-outcome'),
    metaReward: document.getElementById('meta-reward'),
    filePicker: document.getElementById('file-picker'),
  };

  let trajectory = null;
  let frameIdx = 0;
  let playTimer = null;

  function render() {
    if (!trajectory) return;
    const f = trajectory.frames[frameIdx];
    if (!f) return;
    els.tty.textContent = f.tty;
    els.message.textContent = f.message || '—';

    // Status as a 2-col grid; ordered so the most-important fields are on top.
    const keys = ['hitpoints', 'max_hitpoints', 'armor_class', 'depth', 'time',
                  'experience_level', 'gold', 'hunger_state', 'energy',
                  'max_energy', 'dungeon_number', 'level_number'];
    els.status.innerHTML = '';
    for (const k of keys) {
      const v = f.status[k];
      if (v === undefined) continue;
      const kEl = document.createElement('div');
      kEl.className = 'k'; kEl.textContent = k.replace(/_/g, ' ');
      const vEl = document.createElement('div');
      vEl.className = 'v'; vEl.textContent = v;
      els.status.appendChild(kEl); els.status.appendChild(vEl);
    }

    // Inventory.
    els.inventory.innerHTML = '';
    if (!f.inventory || f.inventory.length === 0) {
      const li = document.createElement('li'); li.className = 'empty';
      li.textContent = '(empty)';
      els.inventory.appendChild(li);
    } else {
      for (const it of f.inventory) {
        const li = document.createElement('li');
        const flags = [];
        if (it.is_wielded) flags.push('wielded');
        if (it.is_worn) flags.push('worn');
        if (it.is_blessed === true) flags.push('blessed');
        if (it.is_blessed === false) flags.push('cursed/uncursed');
        const flagSpan = flags.length ? `<span class="flag">[${flags.join(', ')}]</span>` : '';
        li.innerHTML = `<span class="letter">${it.letter}</span>${it.description}${flagSpan}`;
        els.inventory.appendChild(li);
      }
    }

    // Journal.
    if (f.journal && (f.journal.objective || Object.keys(f.journal.notes || {}).length > 0)) {
      let html = '';
      if (f.journal.objective) html += `<div class="obj">▸ ${f.journal.objective}</div>`;
      const notes = f.journal.notes || {};
      for (const [k, v] of Object.entries(notes)) {
        html += `<div>· <strong>${k}</strong>: ${v}</div>`;
      }
      els.journal.innerHTML = html;
    } else {
      els.journal.innerHTML = '<div class="empty">(no notes yet)</div>';
    }

    // Skill / action.
    if (f.skill) {
      const args = f.skill.args ? JSON.stringify(f.skill.args) : '';
      els.skill.textContent = `${f.skill.name}(${args.slice(1, -1)})`;
    } else if (f.action !== null && f.action !== undefined) {
      els.skill.textContent = `raw action: ${f.action}`;
    } else {
      els.skill.textContent = '—';
    }

    // Reward.
    if (f.reward > 0) {
      els.reward.className = 'reward-pos';
    } else if (f.reward < 0) {
      els.reward.className = 'reward-neg';
    } else {
      els.reward.className = 'reward-zero';
    }
    els.reward.textContent = f.reward.toFixed(4);

    // Scrub controls.
    els.scrub.value = String(frameIdx);
    els.frameLabel.textContent = `frame ${frameIdx} / ${trajectory.frames.length - 1}`;
    els.btnPrev.disabled = frameIdx === 0;
    els.btnFirst.disabled = frameIdx === 0;
    els.btnNext.disabled = frameIdx >= trajectory.frames.length - 1;
    els.btnLast.disabled = frameIdx >= trajectory.frames.length - 1;
  }

  function setFrame(i) {
    if (!trajectory) return;
    frameIdx = Math.max(0, Math.min(i, trajectory.frames.length - 1));
    render();
  }

  function play() {
    if (playTimer) {
      clearInterval(playTimer);
      playTimer = null;
      els.btnPlay.textContent = '▶';
      return;
    }
    els.btnPlay.textContent = '⏸';
    playTimer = setInterval(() => {
      if (!trajectory || frameIdx >= trajectory.frames.length - 1) {
        clearInterval(playTimer);
        playTimer = null;
        els.btnPlay.textContent = '▶';
        return;
      }
      setFrame(frameIdx + 1);
    }, 250);
  }

  function loadTrajectoryObject(t) {
    trajectory = t;
    frameIdx = 0;
    els.scrub.max = String(Math.max(0, trajectory.frames.length - 1));
    els.metaSeeds.textContent = trajectory.seeds.join(', ');
    els.metaTask.textContent = trajectory.task_name;
    if (typeof trajectory.character === 'object' && trajectory.character !== null) {
      els.metaCharacter.textContent = [
        trajectory.character.alignment,
        trajectory.character.gender,
        trajectory.character.race,
        trajectory.character.role
      ].filter(Boolean).join(' ');
    } else {
      els.metaCharacter.textContent = trajectory.character || '—';
    }
    const outcome = trajectory.terminated ? 'terminated' : (trajectory.truncated ? 'truncated' : 'open');
    els.metaOutcome.textContent = outcome;
    const total = (trajectory.rewards || []).reduce((s, r) => s + r, 0);
    els.metaReward.textContent = total.toFixed(3);
    render();
  }

  els.btnFirst.addEventListener('click', () => setFrame(0));
  els.btnPrev.addEventListener('click', () => setFrame(frameIdx - 1));
  els.btnPlay.addEventListener('click', play);
  els.btnNext.addEventListener('click', () => setFrame(frameIdx + 1));
  els.btnLast.addEventListener('click', () => setFrame(trajectory ? trajectory.frames.length - 1 : 0));
  els.scrub.addEventListener('input', e => setFrame(parseInt(e.target.value, 10)));
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowLeft') setFrame(frameIdx - 1);
    else if (e.key === 'ArrowRight') setFrame(frameIdx + 1);
    else if (e.key === ' ') { play(); e.preventDefault(); }
    else if (e.key === 'Home') setFrame(0);
    else if (e.key === 'End') setFrame(trajectory ? trajectory.frames.length - 1 : 0);
  });

  els.filePicker.addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    const text = await file.text();
    try {
      const t = JSON.parse(text);
      if (!t.frames || t.frames.length === 0) {
        els.tty.textContent = 'Trajectory has no frames. Re-record with capture_frames=True.';
        return;
      }
      loadTrajectoryObject(t);
    } catch (err) {
      els.tty.textContent = 'Failed to parse JSON: ' + err.message;
    }
  });

  // If `?trajectory=path` is in the URL, fetch and load automatically.
  // Useful when the viewer is hosted next to the trajectory files.
  const params = new URLSearchParams(window.location.search);
  const trajUrl = params.get('trajectory');
  if (trajUrl) {
    fetch(trajUrl).then(r => r.json()).then(loadTrajectoryObject).catch(err => {
      els.tty.textContent = 'Failed to fetch trajectory: ' + err.message;
    });
  }
</script>
</body>
</html>
