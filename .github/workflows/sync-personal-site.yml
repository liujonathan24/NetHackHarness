# Mirror the built browser console into the personal site, so
# liu-jonathan.com/nethack/ never drifts from what this repo ships.
#
# The bundle is fully static and uses only relative asset paths, so it works
# unchanged in a subdirectory — no rebuild, no rewriting, just a file copy.
#
# ONE-TIME SETUP (cannot be done from here):
#   1. Create a fine-grained personal access token scoped to
#      liujonathan24/personal-website with  Contents: read and write.
#   2. Add it to THIS repo as a secret named PERSONAL_SITE_TOKEN
#      (Settings -> Secrets and variables -> Actions -> New repository secret).
# Until that secret exists the job is skipped, not failed.
name: Sync console to personal site

on:
  push:
    branches: [main]
    paths:
      - "deploy/wasm-web/**"
      - ".github/workflows/sync-personal-site.yml"
  workflow_dispatch:        # manual re-sync

concurrency:
  group: sync-personal-site
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check the token is configured
        id: gate
        env:
          TOKEN: ${{ secrets.PERSONAL_SITE_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "PERSONAL_SITE_TOKEN is not set — skipping (see this file's header)."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout this repo
        if: steps.gate.outputs.ok == 'true'
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout the personal site
        if: steps.gate.outputs.ok == 'true'
        uses: actions/checkout@v4
        with:
          repository: liujonathan24/personal-website
          token: ${{ secrets.PERSONAL_SITE_TOKEN }}
          path: site

      - name: Copy the bundle into /nethack/
        if: steps.gate.outputs.ok == 'true'
        run: |
          # --delete so a file removed here also disappears there; without it a
          # renamed page would linger and keep being served.
          rsync -a --delete source/deploy/wasm-web/ site/nethack/
          echo "--- synced tree ---"
          du -sh site/nethack
          ls site/nethack

      - name: Commit and push if anything changed
        if: steps.gate.outputs.ok == 'true'
        working-directory: site
        run: |
          git config user.name  "Jonathan Liu"
          git config user.email "jl0796@princeton.edu"
          git add -A nethack
          if git diff --cached --quiet; then
            echo "nethack/ is already up to date — nothing to push."
            exit 0
          fi
          git commit -m "Sync /nethack/ from NetHackHarness@${GITHUB_SHA::7}

          Mirrors deploy/wasm-web/ from liujonathan24/NetHackHarness. Generated by
          .github/workflows/sync-personal-site.yml — edit the console there, not here."
          git push
