name: Deploy WASM NetHack to GitHub Pages

# Publishes the self-contained static site in deploy/wasm-web/ to GitHub Pages.
# The game runs entirely client-side (WebAssembly + Asyncify) — no server runtime.
# Enable via: repo Settings -> Pages -> Source: GitHub Actions.

on:
  push:
    branches: [main]
    paths: ["deploy/wasm-web/**", ".github/workflows/deploy-wasm-pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        # enablement: turn Pages on (GitHub Actions build type) via the API if it
        # isn't already, so the very first run can't fail with "Get Pages site
        # failed ... Not Found" (the enable-before-read chicken-and-egg).
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy/wasm-web
      - id: deployment
        uses: actions/deploy-pages@v4
