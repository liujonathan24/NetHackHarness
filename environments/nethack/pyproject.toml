[project]
name = "nethack"
description = "Training-grade NetHack environment for LM agents with skill-based tools, milestone curriculum, replay capture, and journal memory."
tags = ["games", "long-horizon", "tool-use", "procgen", "train", "eval"]
version = "0.0.63"
requires-python = ">=3.10,<3.14"
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [{ name = "Jonathan Lin", email = "jl0796@princeton.edu" }]

dependencies = [
    "verifiers>=0.1.14",
    "nle>=1.3.0",
    "gymnasium>=0.29",
    "numpy>=1.24",
    "datasets>=2.14",
]

[project.optional-dependencies]
minihack = ["minihack"]
wiki     = ["chromadb>=0.4", "sentence-transformers>=2.2"]
dev      = ["pytest", "pytest-asyncio", "ruff", "mypy"]

[tool.uv.sources]
minihack = { git = "https://github.com/samvelyan/minihack" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["nethack.py", "nethack_core/**/*.py", "wiki/*.json", "README.md"]

[tool.hatch.build.targets.wheel]
packages = ["nethack_core"]
force-include = { "nethack.py" = "nethack.py", "wiki/snapshot.json" = "wiki/snapshot.json" }
