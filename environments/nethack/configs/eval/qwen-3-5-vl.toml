# Qwen3.5-VL — vision-language model, for the IMG / IMG_TTY encodings.
model = "Qwen/Qwen3.5-VL-7B"

num_examples = 20
rollouts_per_example = 1
max_tokens = 1024

[[eval]]
env_id = "nethack"
# variant / map_detail are supplied per-cell by the encoding-eval orchestrator
# (tools/encoding_eval/run.py). For the VLM, the meaningful encodings are IMG
# and IMG_TTY (pixels); it can also run the text encodings for comparison.
