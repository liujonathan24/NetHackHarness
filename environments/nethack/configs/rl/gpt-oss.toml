# gpt-oss models. Uncomment exactly one model.
model = "openai/gpt-oss-20b"
# model = "openai/gpt-oss-120b"

max_steps = 100
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 1024
reasoning_effort = "low"

# Start with one environment. Uncomment more [[env]] blocks for multi-env training.
[[env]]
id = "primeintellect/reverse-text"

# [[env]]
# id = "primeintellect/wordle"

# [[env]]
# id = "primeintellect/wiki-search"

# [[env]]
# id = "primeintellect/dspy-flights"

# [[env]]
# id = "primeintellect/opencode-harbor"

