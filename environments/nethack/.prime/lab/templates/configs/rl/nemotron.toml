# Nemotron 3 models. Uncomment exactly one model.
model = "nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16"
# model = "nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-BF16"

max_steps = 100
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 1024
enable_thinking = false

# Start with one environment. Uncomment more [[env]] blocks for multi-env training.
[[env]]
id = "primeintellect/reverse-text"

# [[env]]
# id = "primeintellect/wordle"

# [[env]]
# id = "primeintellect/wiki-search"

# [[env]]
# id = "primeintellect/dspy-flights"

# [[env]]
