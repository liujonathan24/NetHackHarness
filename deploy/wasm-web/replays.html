<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#15161c">
  <title>Replays — NetHack Console</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2016%2016'%3E%3Crect%20width='16'%20height='16'%20fill='%2315161c'/%3E%3Ctext%20x='8'%20y='12'%20font-family='monospace'%20font-size='12'%20text-anchor='middle'%20fill='%23ffe08a'%3E@%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="console.css">
  <link rel="stylesheet" href="console.extra.css">
  <!-- console.js (the local console's client, unchanged) supplies colorize() and
       escHtml(); replays.js drives this page off the static trials/*.json. -->
  <script src="console.js"></script>
  <script src="replays.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <noscript>
    <p style="margin:0;padding:10px 14px;background:#7c2626;color:#fff;text-align:center">
      The replay viewer renders client-side and needs JavaScript.
    </p>
  </noscript>
  <nav id="nav" aria-label="Primary">
    <a class="brand" href="./"><span class="glyph" aria-hidden="true">@</span>NetHack Console</a>
    <a class="link" href="./">Intro</a>
    <a class="link active" href="replays.html" aria-current="page">Replays</a>
    <a class="link" href="play.html">Map Viewer</a>
    <span class="spacer"></span>
    <span class="navnote">recorded LLM-agent trials — no engine needed</span>
  </nav>

  <div class="page">
    <nav id="t-list" aria-label="Recorded trials">
      <h2 id="t-list-h">Trials</h2>
      <div class="filters">
        <div class="frow" role="group" aria-label="Filter by agent">
          <span class="flabel">agent</span>
          <button type="button" class="fbtn" data-filter="agent" data-value="all" aria-pressed="true">all</button>
          <button type="button" class="fbtn" data-filter="agent" data-value="rlm" aria-pressed="false">rlm</button>
          <button type="button" class="fbtn" data-filter="agent" data-value="voyager" aria-pressed="false">voyager</button>
        </div>
        <div class="frow" role="group" aria-label="Filter by outcome">
          <span class="flabel">result</span>
          <button type="button" class="fbtn" data-filter="outcome" data-value="all" aria-pressed="true">all</button>
          <button type="button" class="fbtn" data-filter="outcome" data-value="OK" aria-pressed="false">reached D2+</button>
          <button type="button" class="fbtn" data-filter="outcome" data-value="FAIL" aria-pressed="false">stuck on D1</button>
        </div>
      </div>
      <div id="t-items" aria-labelledby="t-list-h">loading trials…</div>
    </nav>

    <main id="main-content" class="t-main" tabindex="-1">
      <h1 class="sr-only">Replays — recorded LLM-agent trials</h1>

      <section id="summary" aria-label="Results summary"></section>

      <div id="t-head"></div>
      <div id="t-status" role="status" aria-live="polite">pick a trial on the left</div>
      <label for="scrub" class="sr-only">Scrub to a turn in this trial</label>
      <input type="range" id="scrub" min="0" max="0" value="0" aria-label="Turn" disabled>
      <div id="t-turninfo"></div>
      <div id="t-map" class="screen" role="img" aria-label="Recorded map at the selected turn"></div>
      <div id="t-llm"></div>
    </main>
  </div>
</body>
</html>
